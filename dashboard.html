<!DOCTYPE html>
<html>
<head>
  <title>PulsePlay Dashboard</title>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f19; color:white; }
    header { padding:15px; background:#111827; display:flex; justify-content:space-between; }
    .container { padding:20px; display:grid; gap:20px; }
    .panel { background:#1f2937; padding:15px; border-radius:10px; }
    .clip { background:#111827; padding:10px; margin-bottom:10px; border-radius:8px; }
    .viral { border:2px solid gold; }
    input { width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:10px; }
    button { padding:10px; background:#3b82f6; border:none; color:white; border-radius:8px; cursor:pointer; }
  </style>
</head>

<body>

<header>
  🚀 PulsePlay Dashboard
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- AI -->
  <div class="panel">
    <h3>🧠 AI Predictor</h3>
    <input id="title" placeholder="Enter clip title..." />
    <button onclick="predict()">Predict</button>
    <div id="result"></div>
  </div>

  <!-- CHART -->
  <div class="panel">
    <h3>📊 Performance</h3>
    <canvas id="chart"></canvas>
  </div>

  <!-- CLIPS -->
  <div class="panel">
    <h3>🔥 Clips</h3>
    <div id="clips"></div>
  </div>

</div>

<script>
const socket = io();
let clips = [];

const user = JSON.parse(localStorage.getItem("pulseplay_user"));
if (!user) window.location.href = "/";

/* LOAD CLIPS */
async function loadClips(){
  const res = await fetch("/clips");
  const data = await res.json();
  clips = data.clips;
  render();
}

/* RENDER */
function render(){
  const div = document.getElementById("clips");
  div.innerHTML = "";

  clips.forEach(c=>{
    const el = document.createElement("div");
    el.className = "clip";
    if(c.score >= 85) el.classList.add("viral");

    el.innerHTML = `
      <b>${c.title}</b><br/>
      Views: ${c.views}<br/>
      Score: ${c.score}<br/>
      ${c.ready_for_post ? `<button onclick="postClip('${c.id}')">🚀 Post</button>` : ""}
    `;

    div.appendChild(el);
  });
}

/* SOCKET */
socket.on("clip_scored",(clip)=>{
  clips.unshift(clip);
  render();
});

/* AI */
async function predict(){
  const title = document.getElementById("title").value;

  const res = await fetch("/predict",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({title})
  });

  const data = await res.json();

  document.getElementById("result").innerHTML =
    `Score: ${data.score}<br/>Tip: ${data.tips}`;
}

/* CHART */
let chart;
async function loadChart(){
  const res = await fetch(`/analytics/${user.id}`);
  const data = await res.json();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels: data.data.map(d=>new Date(d.created_at).toLocaleDateString()),
      datasets:[{
        label:"Score",
        data: data.data.map(d=>d.score)
      }]
    }
  });
}

/* POST */
async function postClip(id){
  await fetch("/post-to-tiktok",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({clip_id:id})
  });

  alert("Posted 🚀");
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("pulseplay_user");
  window.location.href="/";
}

loadClips();
loadChart();
</script>

</body>
</html>
