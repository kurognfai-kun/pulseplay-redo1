<!DOCTYPE html>
<html>
<head>
  <title>PulsePlay Dashboard</title>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    header {
      padding: 20px;
      background: #111827;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .viral {
      border: 2px solid gold;
    }

    button {
      padding: 10px 15px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🚀 PulsePlay Live Dashboard</header>

<div class="container">

  <button onclick="loadClips()">Load Clips</button>

  <h3>Live Feed</h3>
  <div id="feed"></div>

</div>

<script>
  const socket = io();

  const feed = document.getElementById("feed");

  socket.on("clip_scored", (clip) => {
    addClip(clip);
  });

  socket.on("viral_alert", (data) => {
    alert("🔥 VIRAL: " + data.title);
  });

  function addClip(clip) {
    const div = document.createElement("div");
    div.className = "card";

    if (clip.score >= 85) {
      div.classList.add("viral");
    }

    div.innerHTML = `
      <b>${clip.title}</b><br/>
      Views: ${clip.views}<br/>
      Score: ${clip.score}
    `;

    feed.prepend(div);
  }

  async function loadClips() {
    const res = await fetch("/clips");
    const data = await res.json();

    feed.innerHTML = "";
    data.clips.forEach(addClip);
  }
</script>

</body>
</html>
