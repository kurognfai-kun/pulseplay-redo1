<!DOCTYPE html>
<html>
<head>
  <title>PulsePlay SaaS</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 380px;
      background: #111827;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 5px;
    }

    p {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .login {
      background: #3b82f6;
      color: white;
    }

    .signup {
      background: #10b981;
      color: white;
    }

    .status {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 10px;
      text-align: center;
    }

    .brand {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="brand">🚀 PulsePlay</div>
  <h1>Creator SaaS Platform</h1>
  <p>Sign in to access your dashboard</p>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button class="login" onclick="login()">Login</button>
  <button class="signup" onclick="signup()">Create Account</button>

  <div class="status" id="status"></div>
</div>

<script>
/* =========================
   🔐 SUPABASE CONFIG
   ========================= */
const supabaseUrl = "https://vwdyfrqtycczlxdaroir.supabase.com";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3ZHlmcnF0eWNjemx4ZGFyb2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTIyNjgsImV4cCI6MjA5MDI4ODI2OH0.3IY46e0QyOIY5L7jh4Lj3ep0CmoH4w9He7evCBPmwAM";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const status = document.getElementById("status");

/* =========================
   🚀 SIGN UP
   ========================= */
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    status.innerText = error.message;
  } else {
    status.innerText = "✅ Account created! Check email to confirm.";
  }
}

/* =========================
   🔑 LOGIN
   ========================= */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    status.innerText = error.message;
    return;
  }

  // store session
  localStorage.setItem("pulseplay_user", JSON.stringify(data.user));

  // redirect to dashboard
  window.location.href = "/dashboard.html";
}

/* =========================
   🔁 AUTO CHECK SESSION
   ========================= */
window.onload = async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    window.location.href = "/dashboard.html";
  }
};
</script>

</body>
</html>
